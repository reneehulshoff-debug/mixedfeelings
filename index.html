<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Mixed Feelings - 1.0</title>
    <link rel="icon" href="https://fav.farm/✨" />
    <style>
        :root {
            --bg: #FEF9E7;
            --panel: #d1d1d1;
            --fader-knob: #FF10F0;
            --accent: #00E5FF;
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; }
        
        #title-tag {
            position: absolute;
            top: 20px;
            left: 160px;
            font-weight: bold;
            font-size: 28px;
            letter-spacing: 3px;
            color: #202020;
            text-transform: uppercase;
            border-bottom: 4px solid var(--fader-knob);
            z-index: 5;
        }

        #mixer {
            position: absolute;
            top: 0;
            left: 0;
            width: 140px; 
            height: 100vh;
            background: var(--panel);
            border-right: 4px solid #202020;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 5px;
            overflow-y: auto;
            box-shadow: 10px 0 20px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .channel {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 8px 0;
            border-bottom: 1px solid #bbb;
        }

        .label {
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 6px;
            text-transform: uppercase;
            color: #444;
        }

        input[type=range] {
            appearance: none;
            width: 110px;
            height: 4px;
            background: #202020;
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--fader-knob);
            border: 2px solid #202020;
            border-radius: 50%;
            cursor: pointer;
        }

        input[type=color] {
            border: 2px solid #202020;
            width: 40px;
            height: 25px;
            cursor: pointer;
            background: none;
        }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="title-tag">Mixed Feelings</div>
<div id="mixer"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const params = {
        helderheid: 1.5,
        kern: '#FF10F0',
        piek: '#00E5FF',
        draai: 0.005,
        basis: 1.0,
        draagvlak: 1.0,
        evenwicht: 0.0,
        complexiteit: 4.0,
        scherpte: 0.6,
        hartslag: 1.0,
        spanning: 0.1,
        beheersing: 0.2
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#FEF9E7');
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(-1.8, 0.5, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(-1.2, 0, 0);

    // Hogere detailgraad (256 ipv 128) voor dunnere punten
    const geometry = new THREE.SphereGeometry(1, 256, 256);
    const material = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.3, metalness: 0.2 });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    const originalPositions = geometry.attributes.position.array.slice();

    const sun = new THREE.DirectionalLight(0xffffff, params.helderheid);
    sun.position.set(5, 10, 5);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));

    const mixer = document.getElementById('mixer');
    function addChannel(id, label, type, min, max, step) {
        const chan = document.createElement('div');
        chan.className = 'channel';
        chan.innerHTML = `<div class="label">${label}</div>`;
        const input = document.createElement('input');
        input.type = type;
        input.value = params[id];
        if(type === 'range') { input.min = min; input.max = max; input.step = step; }
        input.oninput = (e) => { 
            params[id] = type === 'range' ? parseFloat(e.target.value) : e.target.value;
            if(id === 'helderheid') sun.intensity = params[id];
        };
        chan.appendChild(input);
        mixer.appendChild(chan);
    }

    addChannel('kern', 'Innerlijk', 'color');
    addChannel('piek', 'Uiterlijk', 'color');
    addChannel('basis', 'Grootte', 'range', 0.5, 2, 0.1);
    addChannel('draagvlak', 'Draagvlak', 'range', 0.2, 2, 0.05);
    addChannel('evenwicht', 'Evenwicht', 'range', -0.6, 0.6, 0.05);
    addChannel('complexiteit', 'Complexiteit', 'range', 1, 20, 0.2);
    addChannel('scherpte', 'Scherpte', 'range', 0.1, 5, 0.1); // Slider effectiever gemaakt
    addChannel('beheersing', 'Beheersing', 'range', 0, 1, 0.05);
    addChannel('hartslag', 'Hartslag', 'range', 0, 8, 0.1);
    addChannel('spanning', 'Spanning', 'range', 0, 0.5, 0.01);
    addChannel('draai', 'Turbulentie', 'range', 0, 0.05, 0.001);
    addChannel('helderheid', 'Gloed', 'range', 0, 4, 0.1);

    let time = 0;
    function animate() {
        requestAnimationFrame(animate);
        time += 0.02 * params.hartslag;
        const pos = mesh.geometry.attributes.position.array;
        const colors = new Float32Array(pos.length);
        const c1 = new THREE.Color(params.kern);
        const c2 = new THREE.Color(params.piek);

        for (let i = 0; i < pos.length; i += 3) {
            let vx = originalPositions[i], vy = originalPositions[i+1], vz = originalPositions[i+2];

            // Betere noise voor scherpte
            const ch = params.beheersing * 5.0;
            let n = Math.sin(vx * params.complexiteit + time * 0.1) * 
                    Math.cos(vy * params.complexiteit + time * 0.1) * 
                    Math.sin(vz * params.complexiteit);

            // DE TRUC: Gebruik een hoge exponent om de punten 'naaldachtig' te maken
            // Hoe hoger 'scherpte', hoe dunner de basis van de piek
            let spike = Math.pow(Math.max(0, n), 1.0 + params.scherpte * 2.0) * (params.scherpte * 1.5);
            
            let vibe = Math.sin(time + vx * 10) * params.spanning;
            const r = (params.basis + (vy * params.evenwicht)) + spike + vibe;
            
            const v = new THREE.Vector3(vx, vy * params.draagvlak, vz).normalize().multiplyScalar(r);
            pos[i] = v.x; pos[i+1] = v.y; pos[i+2] = v.z;

            let m = spike * 0.8;
            const finalC = new THREE.Color().copy(c1).lerp(c2, Math.min(1, m));
            colors[i] = finalC.r; colors[i+1] = finalC.g; colors[i+2] = finalC.b;
        }
        
        mesh.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        mesh.geometry.attributes.position.needsUpdate = true;
        mesh.geometry.computeVertexNormals();
        mesh.rotation.y += params.draai;
        renderer.render(scene, camera);
    }
    animate();
    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
