<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Mixedfeelings - 3D Sculptor</title>
    <style>
        :root {
            --bg: #FEF9E7;
            --panel: #d1d1d1;
            --fader-knob: #FF10F0;
            --accent: #00E5FF;
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; }
        
        #title-tag {
            position: absolute;
            top: 20px;
            left: 160px; /* Iets opgeschoven vanaf het menu */
            font-weight: bold;
            font-size: 28px;
            letter-spacing: 3px;
            color: #202020;
            text-transform: uppercase;
            border-bottom: 4px solid var(--fader-knob);
            z-index: 5;
        }

        /* --- MENGPANEEL LINKS --- */
        #mixer {
            position: absolute;
            top: 0;
            left: 0;
            width: 140px; 
            height: 100vh;
            background: var(--panel);
            border-right: 4px solid #202020;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 5px;
            overflow-y: auto;
            box-shadow: 10px 0 20px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .channel {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 8px 0;
            border-bottom: 1px solid #bbb;
        }

        .label {
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 6px;
            text-transform: uppercase;
            color: #444;
            padding: 0 5px;
        }

        input[type=range] {
            appearance: none;
            width: 110px;
            height: 4px;
            background: #202020;
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--fader-knob);
            border: 2px solid #202020;
            border-radius: 50%;
            cursor: pointer;
        }

        input[type=color] {
            border: 2px solid #202020;
            width: 40px;
            height: 25px;
            cursor: pointer;
            background: none;
        }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="title-tag">Mixedfeelings</div>

<div id="mixer">
    <!-- Kanalen worden hier ingevoegd -->
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- STATE ---
    const params = {
        helderheid: 1.5,
        kern: '#FF10F0',
        piek: '#00E5FF',
        draai: 0.005,
        basis: 1.0,
        draagvlak: 1.0,
        evenwicht: 0.0,
        complexiteit: 4.0,
        scherpte: 0.6,
        hartslag: 1.0,
        spanning: 0.1,
        beheersing: 0.2
    };

    // --- THREE SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#FEF9E7');
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    // Camera-offset naar rechts om de vorm visueel links van het midden te zetten
    camera.position.set(-1.8, 0.5, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(-1.2, 0, 0); // Focuspunt ook verschuiven

    const geometry = new THREE.SphereGeometry(1, 128, 128);
    const material = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.3, metalness: 0.2 });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    const originalPositions = geometry.attributes.position.array.slice();

    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, params.helderheid);
    sun.position.set(5, 10, 5);
    scene.add(sun);

    // --- MIXER GENERATOR ---
    const mixer = document.getElementById('mixer');

    function addChannel(id, label, type, min, max, step) {
        const chan = document.createElement('div');
        chan.className = 'channel';
        chan.innerHTML = `<div class="label">${label}</div>`;

        if (type === 'range') {
            const slider = document.createElement('input');
            slider.type = 'range';
            slider.min = min; slider.max = max; slider.step = step;
            slider.value = params[id];
            slider.oninput = (e) => {
                params[id] = parseFloat(e.target.value);
                if(id === 'helderheid') sun.intensity = params[id];
            };
            chan.appendChild(slider);
        } 
        else if (type === 'color') {
            const picker = document.createElement('input');
            picker.type = 'color';
            picker.value = params[id];
            picker.oninput = (e) => params[id] = e.target.value;
            chan.appendChild(picker);
        }

        mixer.appendChild(chan);
    }

    // De nieuwe logische benamingen
    addChannel('kern', 'Innerlijk', 'color');
    addChannel('piek', 'Uiterlijk', 'color');
    addChannel('basis', 'Grootte', 'range', 0.5, 2, 0.1);
    addChannel('draagvlak', 'Draagvlak', 'range', 0.2, 2, 0.05);
    addChannel('evenwicht', 'Evenwicht', 'range', -0.6, 0.6, 0.05);
    addChannel('complexiteit', 'Complexiteit', 'range', 1, 15, 0.2);
    addChannel('scherpte', 'Scherpte', 'range', 0, 2, 0.05);
    addChannel('beheersing', 'Beheersing', 'range', 0, 1, 0.05);
    addChannel('hartslag', 'Hartslag', 'range', 0, 8, 0.1);
    addChannel('spanning', 'Spanning', 'range', 0, 0.5, 0.01);
    addChannel('draai', 'Turbulentie', 'range', 0, 0.05, 0.001);
    addChannel('helderheid', 'Gloed', 'range', 0, 4, 0.1);

    // --- ANIMATIE LOOP ---
    let time = 0;
    function animate() {
        requestAnimationFrame(animate);
        time += 0.02 * params.hartslag;
        
        const pos = mesh.geometry.attributes.position.array;
        const colors = new Float32Array(pos.length);
        const c1 = new THREE.Color(params.kern);
        const c2 = new THREE.Color(params.piek);

        for (let i = 0; i < pos.length; i += 3) {
            let vx = originalPositions[i];
            let vy = originalPositions[i+1];
            let vz = originalPositions[i+2];

            // Trilling
            let vibe = Math.sin(time + vx * 10) * params.spanning;

            // Vorm wiskunde
            const ch = params.beheersing * 5.0;
            const noise = Math.sin(vx * params.complexiteit + vy * ch) * 
                          Math.cos(vy * params.complexiteit + vz * ch) * 
                          Math.sin(vz * params.complexiteit);

            const r = (params.basis + (vy * params.evenwicht)) + (noise * params.scherpte) + vibe;
            
            const v = new THREE.Vector3(vx, vy * params.draagvlak, vz).normalize().multiplyScalar(r);
            pos[i] = v.x; pos[i+1] = v.y; pos[i+2] = v.z;

            // Kleur mixen op basis van radius
            let m = (r - (params.basis - 0.5)) / 1.5;
            const finalC = new THREE.Color().copy(c1).lerp(c2, Math.max(0, Math.min(1, m)));
            colors[i] = finalC.r; colors[i+1] = finalC.g; colors[i+2] = finalC.b;
        }
        
        mesh.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        mesh.geometry.attributes.position.needsUpdate = true;
        mesh.geometry.computeVertexNormals();

        mesh.rotation.y += params.draai;
        renderer.render(scene, camera);
    }

    animate();
    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };

</script>
</body>
</html>
