<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>3D Synth Sculptor</title>
    <style>
        body { margin: 0; overflow: hidden; background: #FEF9E7; font-family: 'Courier New', monospace; color: #202020; }
        canvas { display: block; }

        /* --- VERSTERKER PANEEL --- */
        #ui-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e0e0e0;
            border: 4px solid #202020;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            gap: 25px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
            user-select: none;
            max-width: 90vw;
            overflow-x: auto;
        }

        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .knob-label {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            height: 24px;
        }

        /* De feitelijke draaiknop */
        .knob {
            width: 50px;
            height: 50px;
            background: #202020;
            border-radius: 50%;
            position: relative;
            cursor: ns-resize;
            border: 3px solid #444;
        }

        /* Het streepje op de knop */
        .knob::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            width: 4px;
            height: 15px;
            background: #FF10F0; /* Fuchsia indicator */
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .knob-value {
            font-size: 9px;
            background: #fff;
            padding: 2px 5px;
            border: 1px solid #202020;
            min-width: 30px;
            text-align: center;
        }

        .toggle-btn {
            background: #00E5FF;
            border: 2px solid #202020;
            padding: 5px 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 10px;
        }
        .toggle-btn.active { background: #FF10F0; color: white; }
    </style>
</head>
<body>

<div id="ui-panel">
    <!-- De knoppen worden hier gegenereerd door JS -->
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- CONFIG ---
    const params = {
        draaisnelheid: 0.005,
        trilSnelheid: 1.0,
        trilKracht: 0.1,
        trilType: 'golf', // 'golf' of 'random'
        frequentie: 3.5,
        stekeligheid: 0.6,
        asymmetrie: 0.0,
        elips: 1.0,
        binnenKleur: '#FF10F0',
        buitenKleur: '#00E5FF'
    };

    // --- THREE JS SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#FEF9E7');
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 4;
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);

    const geometry = new THREE.SphereGeometry(1, 128, 128);
    const material = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.3, metalness: 0.4 });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    const originalPositions = geometry.attributes.position.array.slice();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);
    const topLight = new THREE.DirectionalLight(0xffffff, 1.5);
    topLight.position.set(5, 10, 5);
    scene.add(topLight);

    // --- ANIMATIE & VERVORMING ---
    let time = 0;

    function updateGeometry() {
        time += 0.01 * params.trilSnelheid;
        const pos = mesh.geometry.attributes.position.array;
        const colors = new Float32Array(pos.length);
        const c1 = new THREE.Color(params.binnenKleur);
        const c2 = new THREE.Color(params.buitenKleur);

        for (let i = 0; i < pos.length; i += 3) {
            let vx = originalPositions[i];
            let vy = originalPositions[i+1];
            let vz = originalPositions[i+2];

            // 1. Trilling berekenen
            let vibration = 0;
            if (params.trilType === 'golf') {
                vibration = Math.sin(time + vx * 5) * params.trilKracht;
            } else {
                vibration = (Math.random() - 0.5) * params.trilKracht * 0.5;
            }

            // 2. Vorm logica
            const baseRadius = 1.0 + (vy * params.asymmetrie);
            const noise = Math.sin(vx * params.frequentie) * Math.cos(vy * params.frequentie) * Math.sin(vz * params.frequentie);
            const dist = baseRadius + (noise * params.stekeligheid) + vibration;

            const v = new THREE.Vector3(vx, vy * params.elips, vz).normalize().multiplyScalar(dist);
            
            pos[i] = v.x;
            pos[i+1] = v.y;
            pos[i+2] = v.z;

            // Kleur mix
            let m = (dist - 0.5) / 1.5;
            const finalC = new THREE.Color().copy(c1).lerp(c2, Math.max(0, Math.min(1, m)));
            colors[i] = finalC.r; colors[i+1] = finalC.g; colors[i+2] = finalC.b;
        }
        mesh.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        mesh.geometry.attributes.position.needsUpdate = true;
        mesh.geometry.computeVertexNormals();
    }

    // --- CUSTOM GUI GENERATOR ---
    const ui = document.getElementById('ui-panel');

    function createKnob(id, label, min, max, step) {
        const container = document.createElement('div');
        container.className = 'knob-container';
        
        const labelEl = document.createElement('div');
        labelEl.className = 'knob-label';
        labelEl.innerText = label;

        const knob = document.createElement('div');
        knob.className = 'knob';
        
        const valDisplay = document.createElement('div');
        valDisplay.className = 'knob-value';
        valDisplay.innerText = params[id];

        let startY, startVal;

        knob.addEventListener('mousedown', (e) => {
            startY = e.clientY;
            startVal = params[id];
            
            const onMouseMove = (moveE) => {
                const delta = (startY - moveE.clientY) * step;
                params[id] = Math.min(max, Math.max(min, startVal + delta));
                const rotation = ((params[id] - min) / (max - min) * 270) - 135;
                knob.style.transform = `rotate(${rotation}deg)`;
                valDisplay.innerText = params[id].toFixed(2);
            };

            const onMouseUp = () => {
                window.removeEventListener('mousemove', onMouseMove);
                window.removeEventListener('mouseup', onMouseUp);
            };

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        });

        // Initial rotation
        const initialRot = ((params[id] - min) / (max - min) * 270) - 135;
        knob.style.transform = `rotate(${initialRot}deg)`;

        container.appendChild(labelEl);
        container.appendChild(knob);
        container.appendChild(valDisplay);
        ui.appendChild(container);
    }

    // Knoppen aanmaken
    createKnob('draaisnelheid', 'Draai\nSnelheid', 0, 0.05, 0.0002);
    createKnob('trilSnelheid', 'Tril\nSnelheid', 0, 5, 0.05);
    createKnob('trilKracht', 'Tril\nKracht', 0, 0.5, 0.01);
    createKnob('frequentie', 'Aantal\nPieken', 1, 15, 0.1);
    createKnob('stekeligheid', 'Hoogte\nPieken', 0, 2, 0.02);
    createKnob('elips', 'Vorm\n(Ei/Plat)', 0.5, 2, 0.02);

    // Type Selector
    const typeContainer = document.createElement('div');
    typeContainer.className = 'knob-container';
    typeContainer.innerHTML = `<div class="knob-label">Type<br>Trilling</div>`;
    const btn = document.createElement('button');
    btn.className = 'toggle-btn';
    btn.innerText = 'GOLF';
    btn.onclick = () => {
        params.trilType = params.trilType === 'golf' ? 'random' : 'golf';
        btn.innerText = params.trilType.toUpperCase();
        btn.classList.toggle('active');
    };
    typeContainer.appendChild(btn);
    ui.appendChild(typeContainer);

    function animate() {
        requestAnimationFrame(animate);
        mesh.rotation.y += params.draaisnelheid;
        updateGeometry();
        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
